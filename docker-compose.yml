# EventForge — Local development stack
# Full setup guide: docs/LOCAL_DEV.md

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventforge}
      POSTGRES_USER: ${POSTGRES_USER:-eventforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventforge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: events,sqs,stepfunctions,s3,secretsmanager
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/docker/localstack/init:/etc/localstack/init/ready.d

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  # Uncomment when frontend is scaffolded (Phase 1)
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   env_file: .env
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules

  # Uncomment when OTEL collector is configured (Phase 3)
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.114.0
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"
  #   volumes:
  #     - ./infra/docker/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml

volumes:
  postgres_data:
  localstack_data:
