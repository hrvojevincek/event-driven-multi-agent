name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dev dependencies
        run: uv sync --project backend --group dev

      - name: Ruff check
        run: uv run --project backend ruff check --config backend/pyproject.toml backend/

