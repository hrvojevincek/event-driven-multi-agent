name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dev dependencies
        run: uv sync --project backend --group dev

      - name: Ruff check
        run: uv run --project backend ruff check --config backend/pyproject.toml backend/

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: eventforge
          POSTGRES_USER: eventforge
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventforge -d eventforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: eventforge
      POSTGRES_USER: eventforge
      POSTGRES_PASSWORD: changeme
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dev dependencies
        run: uv sync --project backend --group dev

      - name: Run database migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run --project backend pytest backend/tests -m "not integration"

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend
