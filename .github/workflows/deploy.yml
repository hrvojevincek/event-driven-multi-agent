name: Deploy

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/deploy.yml"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: "Component to deploy"
        required: true
        default: all
        type: choice
        options:
          - all
          - backend
          - frontend
          - terraform

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'eventforge-dev-cluster' }}
  ECS_NAME_PREFIX: ${{ vars.ECS_NAME_PREFIX || 'eventforge-dev' }}
  FRONTEND_BUILD_SSM_PATH: ${{ vars.FRONTEND_BUILD_SSM_PATH || '/eventforge/dev/frontend-build' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.result.outputs.backend }}
      frontend: ${{ steps.result.outputs.frontend }}
      terraform: ${{ steps.result.outputs.terraform }}
      deploy_configured: ${{ steps.deploy_config.outputs.configured }}
      deploy_role_arn: ${{ steps.deploy_config.outputs.role_arn }}
    steps:
      - uses: actions/checkout@v4

      - id: deploy_config
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [[ "$AWS_DEPLOY_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/ ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "role_arn=$AWS_DEPLOY_ROLE_ARN" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            if [ -n "$AWS_DEPLOY_ROLE_ARN" ]; then
              echo "::warning::AWS_DEPLOY_ROLE_ARN must be a full IAM role ARN (arn:aws:iam::ACCOUNT:role/NAME), not a role name."
            fi
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            terraform:
              - 'infra/terraform/**'
              - '.github/workflows/deploy.yml'

      - id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.component }}" in
              all)
                echo "backend=true" >> "$GITHUB_OUTPUT"
                echo "frontend=true" >> "$GITHUB_OUTPUT"
                echo "terraform=true" >> "$GITHUB_OUTPUT"
                ;;
              backend) echo "backend=true" >> "$GITHUB_OUTPUT" ;;
              frontend) echo "frontend=true" >> "$GITHUB_OUTPUT" ;;
              terraform) echo "terraform=true" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "backend=${{ steps.filter.outputs.backend == 'true' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend == 'true' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "terraform=${{ steps.filter.outputs.terraform == 'true' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' &&
      github.event_name != 'pull_request' &&
      needs.changes.outputs.deploy_configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OIDC context
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "event=${{ github.event_name }}"
          echo "role=${{ needs.changes.outputs.deploy_role_arn }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.changes.outputs.deploy_role_arn }}
          role-session-name: gha-${{ github.run_id }}-backend
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository
        id: ecr
        run: |
          REPO="${{ vars.ECR_BACKEND_REPOSITORY }}"
          if [ -z "$REPO" ]; then
            REPO="$(aws ecr describe-repositories \
              --repository-names "${ECS_NAME_PREFIX}-backend" \
              --query 'repositories[0].repositoryUri' \
              --output text)"
          fi
          echo "repository=$REPO" >> "$GITHUB_OUTPUT"
          echo "image=${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t "${{ steps.ecr.outputs.image }}" -t "${{ steps.ecr.outputs.repository }}:latest" backend/
          docker push "${{ steps.ecr.outputs.image }}"
          docker push "${{ steps.ecr.outputs.repository }}:latest"

      - name: Roll out ECS services
        env:
          BACKEND_IMAGE: ${{ steps.ecr.outputs.image }}
        run: ./scripts/ci/ecs-deploy-backend.sh

  deploy-frontend:
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' &&
      github.event_name != 'pull_request' &&
      needs.changes.outputs.deploy_configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OIDC context
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "event=${{ github.event_name }}"
          echo "role=${{ needs.changes.outputs.deploy_role_arn }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.changes.outputs.deploy_role_arn }}
          role-session-name: gha-${{ github.run_id }}-frontend
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository
        id: ecr
        run: |
          REPO="${{ vars.ECR_FRONTEND_REPOSITORY }}"
          if [ -z "$REPO" ]; then
            REPO="$(aws ecr describe-repositories \
              --repository-names "${ECS_NAME_PREFIX}-frontend" \
              --query 'repositories[0].repositoryUri' \
              --output text)"
          fi
          echo "repository=$REPO" >> "$GITHUB_OUTPUT"
          echo "image=${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        run: |
          mapfile -t BUILD_ARGS < <(./scripts/ci/frontend-build-args.sh)
          docker build -f frontend/Dockerfile \
            "${BUILD_ARGS[@]}" \
            -t "${{ steps.ecr.outputs.image }}" \
            -t "${{ steps.ecr.outputs.repository }}:latest" \
            frontend/
          docker push "${{ steps.ecr.outputs.image }}"
          docker push "${{ steps.ecr.outputs.repository }}:latest"

      - name: Roll out frontend service
        run: |
          ./scripts/ci/ecs-deploy-service.sh \
            "$ECS_CLUSTER_NAME" \
            "${ECS_NAME_PREFIX}-frontend" \
            "${{ steps.ecr.outputs.image }}" \
            frontend

  terraform:
    needs: changes
    if: |
      needs.changes.outputs.terraform == 'true' &&
      needs.changes.outputs.deploy_configured == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - name: OIDC context
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "event=${{ github.event_name }}"
          echo "role=${{ needs.changes.outputs.deploy_role_arn }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.changes.outputs.deploy_role_arn }}
          role-session-name: gha-${{ github.run_id }}-terraform
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - id: prepare
        name: Prepare terraform.tfvars
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_DEV }}
        run: |
          if [ -z "$TFVARS_CONTENT" ]; then
            echo "TFVARS_DEV secret not set — plan/apply will be skipped"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "$TFVARS_CONTENT" > terraform.tfvars
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format check
        run: terraform fmt -check -recursive ../../..

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: steps.prepare.outputs.ready == 'true'
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.prepare.outputs.ready == 'true'
        run: terraform apply -input=false -auto-approve
